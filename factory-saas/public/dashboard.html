<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>管控台 — 厂区管控</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>

/* ══ 设计主题：深色工业管控台 ══ */
:root {
  --admin-checkin-qr-size: 200px;
  --visitor-row-content-h: calc(var(--admin-checkin-qr-size) + 28px);
  --bg:          #070c18;
  --surface:     #0d1525;
  --surface2:    #111d30;
  --surface3:    #172236;
  --border:      #1c2d45;
  --border2:     #243550;
  --text:        #c8d8ec;
  --text-dim:    #4d6280;
  --text-muted:  #2e4160;
  --text-bright: #e8f0fc;
  --accent:      #38bdf8;
  --accent-dim:  rgba(56,189,248,.1);
  --accent-glow: rgba(56,189,248,.35);
  --green:       #34d399;
  --green-dim:   rgba(52,211,153,.1);
  --yellow:      #fbbf24;
  --yellow-dim:  rgba(251,191,36,.1);
  --red:         #f87171;
  --red-dim:     rgba(248,113,113,.1);
  --purple:      #a78bfa;
  --purple-dim:  rgba(167,139,250,.1);
  /* ── 字体：mono 仅用于数据/代码/英文标签，sans 用于所有中文内容 ── */
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Noto Sans SC', sans-serif;
  /* ── 字号层级 ── */
  --fs-xs:   10px;   /* 次要标签、辅助说明 */
  --fs-sm:   11px;   /* 普通标签、说明文字 */
  --fs-md:   13px;   /* 正文、访客姓名 */
  --fs-lg:   15px;   /* 区块标题 */
  --fs-data: 11px;   /* 数据值（mono） */
  --fs-tag:  10px;   /* 徽章/pill（mono英文）*/
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; overflow:hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.5;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:
    linear-gradient(rgba(56,189,248,.022) 1px, transparent 1px),
    linear-gradient(90deg, rgba(56,189,248,.022) 1px, transparent 1px);
  background-size: 32px 32px;
}

/* ── 顶部导航 ── */
.app-header {
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 14px;
  padding: 0 20px;
  flex-shrink: 0; position: relative; z-index: 10;
}
.app-header::after {
  content:''; position:absolute; bottom:-1px; left:0; right:0; height:1px;
  background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
}
.header-logo { display:flex; align-items:center; gap:10px; flex-shrink:0; }
.header-logo-mark {
  width:32px; height:32px; border:1.5px solid var(--accent); border-radius:6px;
  display:grid; place-items:center; background:var(--accent-dim);
  box-shadow: 0 0 14px var(--accent-glow);
}
.header-logo-mark svg { width:16px; height:16px; fill:var(--accent); }

/* 标题：短英文用 mono，增加辨识度 */
.header-title {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text-bright);
  display: block;
}
/* 副标题：中文用 sans */
.header-subtitle {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 400;
  color: var(--text-dim);
  display: block;
  margin-top: 1px;
}
.header-right { margin-left:auto; display:flex; align-items:center; gap:20px; }

/* ── 连接状态：显示 IP:port，mono 合适 ── */
.conn-status {
  display:flex; align-items:center; gap:8px;
  font-family: var(--mono);
  font-size: var(--fs-xs);
  color: var(--text-dim);
}
.conn-status .dot {
  width:7px; height:7px; border-radius:50%; flex-shrink:0;
  background:var(--green); box-shadow:0 0 8px rgba(52,211,153,.6);
  animation: pulse 2.4s infinite;
}
.conn-status.is-offline .dot {
  background:var(--red); box-shadow:0 0 8px rgba(248,113,113,.4); animation:none;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.45;transform:scale(.82)} }

/* 兼容旧引用 */
.left-footer-status {
  flex-shrink:0; display:flex; align-items:flex-start; gap:8px;
  padding:10px 14px 12px; border-top:1px solid var(--border);
  background:var(--surface); font-family:var(--mono); font-size:var(--fs-xs);
  color:var(--text-dim); line-height:1.4; word-break:break-all;
}
.left-footer-status .dot {
  flex-shrink:0; width:7px; height:7px; margin-top:3px; border-radius:50%;
  background:var(--green); box-shadow:0 0 8px rgba(52,211,153,.5); animation:pulse 2.4s infinite;
}
.left-footer-status.is-offline .dot { background:var(--red); box-shadow:0 0 8px rgba(248,113,113,.4); animation:none; }

/* ── 主布局 ── */
.layout {
  display:grid;
  grid-template-columns: 280px minmax(0,1fr);
  flex:1; overflow:hidden; position:relative; z-index:2; min-height:0;
}

/* ── 左侧配置栏 ── */
aside.left-config {
  display:flex; flex-direction:column; overflow:hidden;
  background:var(--surface); border-right:1px solid var(--border);
}
.left-config-body {
  flex:1; overflow-y:auto; padding:16px 14px 20px;
  display:flex; flex-direction:column; gap:16px;
}
.left-config-body::-webkit-scrollbar { width:3px; }
.left-config-body::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

/* 区块小标题：中文+短英文混排，用 sans 更协调 */
.left-block-title {
  font-family: var(--sans);
  font-size: var(--fs-xs);
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--text-dim);
}

.area-select-row { display:grid; grid-template-columns:1fr auto auto auto; gap:6px; align-items:center; }
.area-select {
  border:1px solid var(--border2); border-radius:6px; height:32px; padding:0 8px;
  font-size: var(--fs-sm);
  color:var(--text); background:var(--surface2); font-family:var(--sans); outline:none;
}
.area-select:focus { border-color:var(--accent); }
.checkin-area-action {
  width:28px; height:28px; border-radius:6px; border:1px solid var(--border2);
  background:transparent; color:var(--text-dim); font-size:13px;
  font-family:var(--mono); font-weight:600;
  display:flex; align-items:center; justify-content:center; cursor:pointer; padding:0; transition:all .15s;
}
.checkin-area-action:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }

.left-checkin-qr {
  display:flex; flex-direction:column; align-items:center; gap:8px;
  padding:14px 10px; border:1px solid var(--border2); border-radius:14px;
  background:var(--surface2); position:relative; overflow:hidden;
}
.left-checkin-qr::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:radial-gradient(circle at 50% 40%, rgba(56,189,248,.06), transparent 70%);
}
.left-checkin-qr img {
  width:min(var(--admin-checkin-qr-size),100%); height:auto; aspect-ratio:1;
  border-radius:10px; display:block; background:#fff;
  border:2px solid var(--border2); object-fit:contain;
  box-shadow:0 4px 20px rgba(0,0,0,.5); position:relative;
}
/* QR 标签：纯英文大写，mono 合适 */
.checkin-qr-label {
  font-family: var(--mono);
  font-size: var(--fs-xs);
  color: var(--accent);
  letter-spacing: .12em;
  text-transform: uppercase;
  position: relative;
}

.preset-panel {
  border:1px solid var(--border2); border-radius:10px; padding:12px;
  background:var(--surface2); display:flex; flex-direction:column; gap:8px;
}
/* 预设面板标题：中文，用 sans */
.preset-panel .preset-title {
  font-family: var(--sans);
  font-size: var(--fs-sm);
  font-weight: 700;
  color: var(--text-bright);
}
.preset-panel label {
  font-family: var(--sans);
  font-size: var(--fs-xs);
  color: var(--text-dim);
}
.preset-panel input[type="text"] {
  width:100%; border:1px solid var(--border2); border-radius:6px;
  padding:7px 10px;
  font-size: var(--fs-sm);
  font-family:var(--sans);
  background:var(--surface3); color:var(--text-bright); outline:none; transition:border-color .15s, box-shadow .15s;
}
.preset-panel input[type="text"]:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-dim); }
.preset-panel input[type="text"]::placeholder { color:var(--text-muted); }
.preset-panel .preset-hint {
  font-family: var(--sans);
  font-size: var(--fs-xs);
  color: var(--text-dim);
  line-height: 1.55;
}
.preset-save {
  align-self:flex-start; padding:6px 14px;
  font-family: var(--sans);
  font-size: var(--fs-xs);
  border-radius:6px; border:1px solid var(--border2);
  background:var(--surface3); color:var(--text);
  cursor:pointer; transition:all .15s;
}
.preset-save:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }

.history-panel {
  border-top:1px solid var(--border); padding-top:14px; margin-top:2px;
  display:flex; flex-direction:column; gap:6px;
}
.history-panel-short-hint {
  font-family: var(--sans);
  font-size: var(--fs-xs);
  color: var(--text-dim);
  line-height: 1.55;
}

/* ── 右侧主内容 ── */
main.admin-main {
  min-width:0; flex:1; overflow-y:auto; display:flex; flex-direction:column; background:transparent;
}
main.admin-main::-webkit-scrollbar { width:4px; }
main.admin-main::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

.home-dashboard { flex:1; padding:16px 18px 24px; width:100%; box-sizing:border-box; min-width:0; }
.home-main { display:flex; flex-direction:column; gap:14px; width:100%; max-width:100%; min-width:0; }

.visitor-table-wrap {
  border:1px solid var(--border); border-radius:14px; background:var(--surface);
  overflow:hidden; display:flex; flex-direction:column;
  box-shadow:0 4px 32px rgba(0,0,0,.4);
}
/* 表头：中文"当前访客"，用 sans */
.visitor-table-head {
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  padding:11px 16px; border-bottom:1px solid var(--border); background:var(--surface2);
  font-family: var(--sans);
  font-size: var(--fs-sm);
  font-weight: 600;
  color: var(--text-dim);
  flex-shrink:0;
}
.visitor-table-head-actions { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.btn-history-link {
  font-family:var(--sans); font-size: var(--fs-sm); padding:5px 12px; border-radius:6px;
  border:1px solid var(--border2); background:var(--surface3); color:var(--accent);
  cursor:pointer; font-weight:600; transition:all .15s;
}
.btn-history-link:hover { border-color:var(--accent); background:var(--accent-dim); box-shadow:0 0 8px var(--accent-glow); }

.visitor-table {
  display:flex; flex-direction:column;
  max-height:min(72vh,940px); overflow-y:auto;
}
.visitor-table::-webkit-scrollbar { width:4px; }
.visitor-table::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

/* ── 访客卡片 ── */
.visitor-card {
  border-bottom:1px solid var(--border); padding:0 12px;
  cursor:pointer; transition:background .12s;
  height:var(--visitor-row-content-h); box-sizing:border-box; overflow:hidden;
  position:relative;
}
.visitor-card::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:2px;
  background:transparent; transition:background .2s;
}
.visitor-card:last-child { border-bottom:none; }
.visitor-card:hover { background:var(--surface2); }
.visitor-card:hover::before { background:var(--border2); }
.visitor-card.active { background:rgba(56,189,248,.04); }
.visitor-card.active::before { background:var(--accent); }

.visitor-card-layout {
  display:grid;
  grid-template-columns:minmax(0,1.4fr) minmax(0,auto) minmax(0,auto) minmax(0,1.6fr);
  gap:8px 12px; align-items:stretch; height:100%; min-height:0;
}
.visitor-strip { min-height:0; min-width:0; display:flex; flex-direction:column; }

/* 列小标题：简短英文，mono 可读 */
.strip-h {
  font-family: var(--mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--text-muted);
  line-height: 1.2;
  margin-bottom: 4px;
  flex-shrink: 0;
  padding-top: 8px;
}
.visitor-strip-body { flex:1; min-height:0; overflow:hidden; display:flex; flex-direction:column; }

.visitor-qr-entry-col,.visitor-qr-exit-col {
  width:calc(var(--admin-checkin-qr-size) + 16px); max-width:100%; flex-shrink:0;
}
.visitor-qr-entry-col .visitor-strip-body,
.visitor-qr-exit-col .visitor-strip-body { align-items:center; justify-content:center; }

/* ── QR 码槽 ── */
.qr-slot {
  position:relative; border-radius:6px; border:1.5px solid var(--border2);
  background:var(--surface3); padding:4px; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:2px;
  height:100%; min-height:0; max-height:100%; box-sizing:border-box;
  transition:border-color .15s, opacity .15s, box-shadow .15s;
}
/* QR 标签纯英文：mono */
.qr-slot-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: .06em;
  color: var(--text-dim);
  text-transform: uppercase;
}
.visitor-card .qr-slot img {
  width:auto; height:auto;
  max-width:min(var(--admin-checkin-qr-size),100%);
  max-height:min(var(--admin-checkin-qr-size),calc(var(--visitor-row-content-h) - 24px));
  object-fit:contain; border-radius:3px; display:block;
}

.qr-entry-active { border-color:var(--accent); box-shadow:0 0 0 3px rgba(56,189,248,.12),0 0 16px rgba(56,189,248,.18); animation:qr-pulse 2s ease-in-out infinite; }
.qr-entry-warn   { border-color:var(--yellow); box-shadow:0 0 0 3px rgba(251,191,36,.1); animation:qr-pulse-warn 2.2s ease-in-out infinite; }
.qr-entry-done   { border-color:rgba(52,211,153,.35); background:rgba(52,211,153,.05); opacity:.82; }
.qr-entry-done img { opacity:.5; }
@keyframes qr-pulse      { 0%,100%{box-shadow:0 0 0 3px rgba(56,189,248,.1),0 0 10px rgba(56,189,248,.14)} 50%{box-shadow:0 0 0 6px rgba(56,189,248,.03),0 0 18px rgba(56,189,248,.07)} }
@keyframes qr-pulse-warn { 0%,100%{box-shadow:0 0 0 2px rgba(251,191,36,.12)} 50%{box-shadow:0 0 0 5px rgba(251,191,36,.03)} }

.qr-done-badge {
  position:absolute; top:4px; right:4px; width:18px; height:18px; border-radius:50%;
  background:var(--green); color:#000; font-size:10px; font-weight:700;
  display:grid; place-items:center; box-shadow:0 0 8px rgba(52,211,153,.5);
}
.qr-exit-active { border-color:var(--purple); box-shadow:0 0 0 3px rgba(167,139,250,.12); }
.qr-exit-done   { border-color:var(--border2); opacity:.65; }
.qr-exit-locked { opacity:.28; filter:grayscale(.6); pointer-events:none; }
.qr-exit-locked::after {
  content:'管控后可用'; position:absolute; inset:0; display:grid; place-items:center;
  font-family: var(--sans);
  font-size: var(--fs-xs);
  font-weight:600; color:var(--text-dim);
  background:rgba(7,12,24,.75); border-radius:6px;
}

/* ── 反馈列 ── */
.visitor-feedback-body { display:flex; flex-direction:column; gap:5px; flex:1; min-height:0; overflow:hidden; }
.visitor-feedback-head { display:flex; align-items:center; justify-content:space-between; gap:6px; flex-shrink:0; flex-wrap:wrap; }

/* 状态消息：中文内容，改为 sans */
.visitor-status-line {
  font-family: var(--sans);
  font-size: var(--fs-sm);
  font-weight: 500;
  color: var(--text-bright);
  padding: 4px 8px;
  border-radius: 6px;
  background: var(--surface3);
  border: 1px solid var(--border2);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  line-clamp: 2;
  overflow: hidden;
  line-height: 1.45;
  flex-shrink: 0;
}

/* 状态提示：中文，sans */
.visitor-status-hint {
  font-family: var(--sans);
  font-size: var(--fs-xs);
  color: var(--yellow);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex-shrink: 0;
}

.visitor-steps-feedback {
  display:flex; flex-direction:column; gap:5px; flex:1; min-height:0;
  overflow-y:auto; overflow-x:hidden; padding-bottom:2px; margin-top:2px;
}
.visitor-steps-feedback::-webkit-scrollbar { width:2px; }
.visitor-steps-feedback::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
.visitor-steps-feedback .step { display:flex; flex-direction:row; align-items:flex-start; gap:7px; flex-shrink:0; }
.visitor-steps-feedback .step-icon { width:18px; height:18px; font-size:9px; flex-shrink:0; }
.visitor-steps-feedback .step-text { font-size: var(--fs-xs); line-height:1.45; padding-top:2px; flex:1; min-width:0; word-break:break-word; }

.visitor-feedback-actions { display:flex; flex-direction:column; gap:5px; flex-shrink:0; }
/* ── 访客搜索 & 筛选栏 ── */
.visitor-filter-bar {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 10px 14px 8px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
  flex-shrink: 0;
}

.visitor-search-wrap {
  position: relative;
  display: flex;
  align-items: center;
}

.visitor-search-icon {
  position: absolute;
  left: 10px;
  font-size: 15px;
  color: var(--text-dim);
  pointer-events: none;
  line-height: 1;
  top: 50%;
  transform: translateY(-50%);
}

.visitor-search-input {
  width: 100%;
  height: 34px;
  padding: 0 34px 0 32px;
  border: 1px solid var(--border2);
  border-radius: 8px;
  background: var(--surface3);
  color: var(--text-bright);
  font-family: var(--sans);
  font-size: var(--fs-sm);
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}

.visitor-search-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}

.visitor-search-input::placeholder { color: var(--text-muted); }

.visitor-search-clear {
  position: absolute;
  right: 8px;
  width: 20px; height: 20px;
  border-radius: 50%;
  border: none;
  background: var(--border2);
  color: var(--text-dim);
  font-size: 13px;
  line-height: 1;
  display: grid; place-items: center;
  cursor: pointer;
  transition: background .15s, color .15s;
  padding: 0;
}

.visitor-search-clear:hover {
  background: var(--red-dim);
  color: var(--red);
}

/* ── 筛选 Tabs ── */
.visitor-filter-tabs {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.ftab {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text-dim);
  font-family: var(--sans);
  font-size: var(--fs-xs);
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}

.ftab:hover {
  border-color: var(--accent);
  color: var(--text);
  background: var(--accent-dim);
}

.ftab.ftab-active {
  border-color: var(--accent);
  background: var(--accent-dim);
  color: var(--accent);
  font-weight: 600;
}

.ftab.ftab-empty {
  opacity: .4;
}

.ftab-count {
  font-family: var(--mono);
  font-size: 9px;
  min-width: 16px;
  height: 16px;
  border-radius: 8px;
  background: var(--surface3);
  color: var(--text-dim);
  display: grid;
  place-items: center;
  padding: 0 4px;
  line-height: 1;
}

.ftab.ftab-active .ftab-count {
  background: rgba(56,189,248,.2);
  color: var(--accent);
}

/* 筛选无结果 */
.visitor-empty-filter {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.empty-filter-icon {
  font-size: 32px;
  opacity: .5;
  margin-bottom: 4px;
}

/* ── 管控详情区域 ── */
.restriction-detail {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 3px;
  margin-top: 2px;
}
.restriction-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
}
.warn-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
}
/* 告警 pill 加左侧橙色边 */
.restrict-warn {
  border-left: 2px solid var(--yellow) !important;
  padding-left: 5px;
}

.control-pills { display:flex; flex-wrap:wrap; gap:3px; }
.visitor-card-actions { display:flex; flex-wrap:wrap; gap:4px; }

/* ── Pills：纯英文缩写，mono 保留 ── */
.pill {
  font-family: var(--mono);
  font-size: var(--fs-tag);
  padding: 2px 6px;
  border-radius: 3px;
  border: 1px solid var(--border2);
  background: var(--surface3);
  color: var(--text-dim);
  white-space: nowrap;
  letter-spacing: .04em;
}
.pill-ok   { background:rgba(52,211,153,.1);  border-color:rgba(52,211,153,.3);  color:#34d399; }
.pill-warn { background:rgba(251,191,36,.1);  border-color:rgba(251,191,36,.3);  color:#fbbf24; }
.pill-err  { background:rgba(248,113,113,.1); border-color:rgba(248,113,113,.3); color:#f87171; }
.pill-wait { background:var(--surface3); border-color:var(--border2); color:var(--text-dim); }
.pill-info { background:rgba(167,139,250,.1); border-color:rgba(167,139,250,.3); color:#a78bfa; }
.pill-off  { opacity:.4; }

/* 日志展开按钮：中文"操作日志（X条）"，用 sans */
.btn-log-popover {
  padding: 5px 8px;
  font-family: var(--sans);
  font-size: var(--fs-xs);
  border: 1px dashed var(--border2);
  border-radius: 6px;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  text-align: center;
  width: 100%;
  box-sizing: border-box;
  transition: all .15s;
}
.btn-log-popover:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }

/* ── 访客 KV 信息 ── */
.visitor-kv {
  display:grid; grid-template-columns:auto minmax(0,1fr); gap:4px 8px;
  align-items:baseline; overflow-y:auto; overflow-x:hidden; padding-right:2px;
}
.visitor-kv::-webkit-scrollbar { width:2px; }
.visitor-kv::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

/* KV 标签：中文"姓名/公司/区域"，用 sans */
.visitor-kv dt {
  margin:0;
  font-family: var(--sans);
  font-size: var(--fs-xs);
  font-weight: 600;
  color: var(--text-dim);
  white-space: nowrap;
}
.visitor-kv dt::after { content:''; }
.visitor-kv dd {
  margin:0;
  font-family: var(--sans);
  font-size: var(--fs-sm);
  color: var(--text-bright);
  word-break:break-word;
  line-height:1.4;
}
.visitor-kv dd.visitor-kv-name {
  font-size: var(--fs-md);
  font-weight: 600;
}
/* 设备ID、IP等纯数据：mono */
.visitor-kv dd.visitor-kv-mono {
  font-family: var(--mono);
  font-size: var(--fs-data);
  color: var(--text-dim);
}
.visitor-kv .kv-hint {
  font-family: var(--sans);
  font-size: var(--fs-xs);
  color: var(--text-dim);
}
.visitor-self-tag {
  font-family: var(--sans);
  font-size: var(--fs-xs);
  opacity: .6;
}

/* ── 步骤 ── */
.step { display:flex; align-items:flex-start; gap:8px; }
.step-icon {
  width:18px; height:18px; border-radius:50%; border:1.5px solid var(--border2);
  display:grid; place-items:center; flex-shrink:0;
  font-family: var(--mono); /* 步骤编号/符号，mono */
  font-size: 9px;
  font-weight: 600;
  color: var(--text-dim);
  transition:all .3s; background:var(--surface3);
}
.step.done   .step-icon { background:rgba(52,211,153,.12); border-color:rgba(52,211,153,.45); color:var(--green); }
.step.active .step-icon { background:var(--accent-dim); border-color:var(--accent); color:var(--accent); animation:step-pulse 1.5s infinite; }
.step.error  .step-icon { background:rgba(248,113,113,.12); border-color:rgba(248,113,113,.45); color:var(--red); }
@keyframes step-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(56,189,248,.4)} 50%{box-shadow:0 0 0 4px rgba(56,189,248,0)} }
/* 步骤文字：中文，sans */
.step-text {
  font-family: var(--sans);
  font-size: var(--fs-sm);
  color: var(--text);
  line-height: 1.45;
  padding-top: 1px;
}
.step.done .step-text { color: var(--text-dim); }

/* ── 状态徽章：纯英文大写，mono 合适 ── */
.status-badge {
  font-family: var(--mono);
  font-size: var(--fs-tag);
  padding: 2px 7px;
  border-radius: 3px;
  letter-spacing: .05em;
  font-weight: 600;
  white-space: nowrap;
  border: 1px solid transparent;
}
.badge-waiting            { background:var(--surface3); border-color:var(--border2); color:var(--text-dim); }
.badge-pairing            { background:rgba(251,191,36,.1); border-color:rgba(251,191,36,.3); color:#fbbf24; }
.badge-paired_not_connected { background:rgba(251,191,36,.1); border-color:rgba(251,191,36,.3); color:#fb923c; }
.badge-restricted         { background:rgba(56,189,248,.1); border-color:rgba(56,189,248,.3); color:var(--accent); }
.badge-exiting            { background:rgba(167,139,250,.1); border-color:rgba(167,139,250,.3); color:var(--purple); }
.badge-exited             { background:rgba(52,211,153,.1); border-color:rgba(52,211,153,.3); color:var(--green); }
.badge-error              { background:rgba(248,113,113,.1); border-color:rgba(248,113,113,.3); color:var(--red); }

/* ── 日志弹窗 ── */
.visitor-log-popover {
  border-top:1px solid var(--border); background:var(--surface);
  display:flex; flex-direction:column;
  max-height:min(40vh,380px); animation:logPopIn .18s ease-out; flex-shrink:0;
}
@keyframes logPopIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
.visitor-log-popover.is-hidden { display:none !important; }
.visitor-log-popover-head {
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  padding:8px 14px; border-bottom:1px solid var(--border);
  font-family: var(--sans);
  font-size: var(--fs-sm);
  font-weight: 600;
  color:var(--text-bright); flex-shrink:0; background:var(--surface2);
}
.visitor-log-popover-head button {
  padding:4px 12px;
  font-family: var(--sans);
  font-size: var(--fs-xs);
  border-radius:6px; border:1px solid var(--border2);
  background:var(--surface3); color:var(--text);
  cursor:pointer; transition:all .15s;
}
.visitor-log-popover-head button:hover { border-color:var(--accent); color:var(--accent); }
/* 日志内容：代码/命令行，mono 合适 */
.visitor-log-popover-body {
  overflow-y:auto; padding:10px 14px 14px;
  font-family: var(--mono);
  font-size: var(--fs-data);
  line-height: 1.65;
  flex:1; min-height:0; background:var(--bg);
}
.log-entry-pop { padding:3px 0; border-bottom:1px solid var(--border); word-break:break-word; color:var(--text); }
.log-entry-pop:last-child { border-bottom:none; }
.log-entry-pop.error { color:var(--red); }
.log-empty {
  font-family: var(--sans);
  font-size: var(--fs-sm);
  color:var(--text-dim); padding:12px 0; text-align:center;
}

.visitor-empty {
  font-family: var(--sans);
  padding:60px 20px; text-align:center;
  font-size: var(--fs-md);
  color:var(--text-dim); line-height:1.8;
}

/* ── 按钮 ── */
.btn {
  padding:6px 14px; border-radius:6px;
  font-family: var(--sans);
  font-size: var(--fs-sm);
  font-weight:500; cursor:pointer; border:1px solid transparent; transition:all .15s;
}
.btn-sm { padding:3px 8px; font-size: var(--fs-xs); }
.btn-outline { background:transparent; border-color:var(--border2); color:var(--text); }
.btn-outline:hover { background:var(--surface2); }
.btn-danger { background:transparent; border-color:rgba(248,113,113,.4); color:var(--red); }
.btn-danger:hover { background:var(--red-dim); border-color:var(--red); }
.btn-primary { background:var(--accent); color:#000; border-color:var(--accent); font-weight:600; }
.btn-primary:hover { background:#7dd3fc; box-shadow:0 0 12px var(--accent-glow); }
.btn-purple { background:transparent; border-color:rgba(167,139,250,.4); color:var(--purple); }
.btn-purple:hover { background:var(--purple-dim); border-color:var(--purple); }
.btn:disabled { opacity:.3; cursor:not-allowed; }

/* ── 安全告警 ── */
.security-alert {
  background:var(--surface); border:1.5px solid rgba(248,113,113,.5); border-radius:10px;
  padding:14px 16px; box-shadow:0 8px 32px rgba(248,113,113,.2),0 0 0 1px rgba(248,113,113,.08);
  animation:alertSlideIn .3s cubic-bezier(.22,.68,0,1.2);
}
@keyframes alertSlideIn { from{transform:translateX(100%) scale(.95);opacity:0} to{transform:translateX(0) scale(1);opacity:1} }
.alert-header {
  display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;
  font-family: var(--sans);
  font-size: var(--fs-sm);
  font-weight:600; color:var(--red);
}
.alert-dismiss { background:none; border:none; font-size:18px; color:var(--red); cursor:pointer; padding:0 4px; opacity:.7; transition:opacity .15s; }
.alert-dismiss:hover { opacity:1; }
/* 告警内容：中文，sans */
.alert-body {
  font-family: var(--sans);
  font-size: var(--fs-sm);
  color:var(--text); line-height:1.65; white-space:pre-line; margin-bottom:10px;
}
.alert-action {
  background:var(--red); color:#fff; border:none; border-radius:6px;
  padding:5px 14px;
  font-family: var(--sans);
  font-size: var(--fs-xs);
  font-weight:600; cursor:pointer;
}
.alert-action:hover { background:#fc8181; }

/* ══ 历史记录页 ══════════════════════════════════════════════ */
.history-page {
  display: flex;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

/* ── 顶部工具栏 ── */
.hist-toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.hist-title {
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 700;
  color: var(--text-bright);
  white-space: nowrap;
}

.hist-toolbar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

/* ── 汇总统计条 ── */
.hist-stats-bar {
  display: flex;
  align-items: stretch;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  overflow-x: auto;
}

.hist-stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  padding: 10px 20px;
  border-right: 1px solid var(--border);
  min-width: 90px;
  flex-shrink: 0;
}

.hist-stat:last-child { border-right: none; }
.hist-stat-val { font-family: var(--mono); font-size: 20px; font-weight: 700; color: var(--text-bright); line-height: 1.1; }
.hist-stat-label { font-family: var(--sans); font-size: 10px; color: var(--text-dim); white-space: nowrap; }
.hist-stat.warn .hist-stat-val { color: var(--yellow); }
.hist-stat.danger .hist-stat-val { color: var(--red); }
.hist-stat.accent .hist-stat-val { color: var(--accent); }

/* ── 筛选条 ── */
.hist-filter-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.hist-search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 320px; }
.hist-search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--text-dim); pointer-events: none; }
.hist-search-input {
  width: 100%; height: 32px; padding: 0 32px 0 30px;
  border: 1px solid var(--border2); border-radius: 7px;
  background: var(--surface3); color: var(--text-bright);
  font-family: var(--sans); font-size: var(--fs-sm); outline: none; transition: border-color .15s, box-shadow .15s;
}
.hist-search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
.hist-search-input::placeholder { color: var(--text-muted); }
.hist-search-clear {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  width: 18px; height: 18px; border-radius: 50%; border: none;
  background: var(--border2); color: var(--text-dim); font-size: 12px;
  display: grid; place-items: center; cursor: pointer; padding: 0; line-height: 1;
}
.hist-search-clear:hover { background: var(--red-dim); color: var(--red); }

.hist-filter-select {
  height: 32px; padding: 0 8px; border: 1px solid var(--border2); border-radius: 7px;
  background: var(--surface3); color: var(--text); font-family: var(--sans);
  font-size: var(--fs-xs); outline: none; cursor: pointer; transition: border-color .15s;
}
.hist-filter-select:focus { border-color: var(--accent); }

.hist-filter-label { font-family: var(--sans); font-size: var(--fs-xs); color: var(--text-dim); white-space: nowrap; flex-shrink: 0; }

.hist-filter-date {
  height: 32px; padding: 0 8px; border: 1px solid var(--border2); border-radius: 7px;
  background: var(--surface3); color: var(--text); font-family: var(--mono);
  font-size: var(--fs-xs); outline: none; width: 130px; transition: border-color .15s;
}
.hist-filter-date:focus { border-color: var(--accent); }

.hist-result-count { font-family: var(--mono); font-size: var(--fs-xs); color: var(--text-dim); white-space: nowrap; margin-left: auto; flex-shrink: 0; }

/* ── 主体 ── */
.hist-body { flex: 1; min-height: 0; display: grid; grid-template-columns: minmax(280px,380px) minmax(0,1fr); overflow: hidden; }

/* 左列表 */
.hist-list-col { border-right: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0; background: var(--surface); }
.hist-list-header {
  display: grid; grid-template-columns: 1fr auto auto; align-items: center; gap: 8px;
  padding: 7px 12px; border-bottom: 1px solid var(--border); background: var(--surface2);
  font-family: var(--mono); font-size: 9px; letter-spacing: .08em; text-transform: uppercase;
  color: var(--text-dim); flex-shrink: 0;
}
.hist-list-scroll { flex: 1; overflow-y: auto; min-height: 0; }
.hist-list-scroll::-webkit-scrollbar { width: 3px; }
.hist-list-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.hist-row {
  display: flex; flex-direction: column; gap: 3px; padding: 10px 12px;
  border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; position: relative;
}
.hist-row::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: transparent; transition: background .15s; }
.hist-row:last-child { border-bottom: none; }
.hist-row:hover { background: var(--surface2); }
.hist-row.is-active { background: rgba(56,189,248,.05); }
.hist-row.is-active::before { background: var(--accent); }
.hist-row.has-tamper::before { background: var(--red); }
.hist-row-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.hist-row-name { font-family: var(--sans); font-size: var(--fs-sm); font-weight: 600; color: var(--text-bright); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hist-row-badges { display: flex; gap: 3px; flex-shrink: 0; }
.hist-row-meta { display: flex; gap: 10px; font-family: var(--mono); font-size: 10px; color: var(--text-dim); flex-wrap: wrap; }
.hist-row-duration { display: flex; align-items: center; gap: 4px; font-family: var(--mono); font-size: 10px; color: var(--text-dim); }
.hist-row-duration.long { color: var(--yellow); }

/* 右详情 */
.hist-detail-col { display: flex; flex-direction: column; min-height: 0; background: var(--bg); }
.hist-detail-header {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--surface2);
  flex-shrink: 0; flex-wrap: wrap;
}
.hist-detail-name { font-family: var(--sans); font-size: 15px; font-weight: 700; color: var(--text-bright); }
.hist-detail-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.hist-detail-scroll { flex: 1; overflow-y: auto; padding: 16px; min-height: 0; }
.hist-detail-scroll::-webkit-scrollbar { width: 3px; }
.hist-detail-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.hist-detail-section { margin-bottom: 18px; }
.hist-detail-section-title {
  font-family: var(--sans); font-size: 10px; font-weight: 700; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px;
  display: flex; align-items: center; gap: 8px;
}
.hist-detail-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.hist-info-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
  border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: var(--border);
}
.hist-info-cell { display: flex; flex-direction: column; gap: 3px; padding: 10px 12px; background: var(--surface); }
.hist-info-cell.full-width { grid-column: 1 / -1; }
.hist-info-key { font-family: var(--sans); font-size: 10px; color: var(--text-dim); font-weight: 600; }
.hist-info-val { font-family: var(--mono); font-size: var(--fs-sm); color: var(--text-bright); word-break: break-all; }
.hist-info-val.sans { font-family: var(--sans); }

.hist-timeline { display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.hist-tl-item {
  display: grid; grid-template-columns: 20px 1fr auto; gap: 10px; align-items: center;
  padding: 10px 12px; background: var(--surface); border-bottom: 1px solid var(--border);
}
.hist-tl-item:last-child { border-bottom: none; }
.hist-tl-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border2); border: 1.5px solid var(--border); margin: 0 auto; }
.hist-tl-dot.done   { background: var(--green);  border-color: rgba(52,211,153,.5);  box-shadow: 0 0 6px rgba(52,211,153,.3); }
.hist-tl-dot.warn   { background: var(--yellow); border-color: rgba(251,191,36,.5); }
.hist-tl-dot.danger { background: var(--red);    border-color: rgba(248,113,113,.5); }
.hist-tl-dot.skip   { opacity: .4; }
.hist-tl-label { font-family: var(--sans); font-size: var(--fs-sm); color: var(--text); }
.hist-tl-time  { font-family: var(--mono); font-size: 11px; color: var(--text-dim); text-align: right; white-space: nowrap; }

.hist-tamper-block { padding: 12px 14px; background: rgba(248,113,113,.07); border: 1px solid rgba(248,113,113,.25); border-radius: 8px; margin-bottom: 12px; }
.hist-tamper-title { font-family: var(--sans); font-size: var(--fs-sm); font-weight: 700; color: var(--red); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.hist-tamper-detail { font-family: var(--sans); font-size: var(--fs-xs); color: rgba(248,113,113,.85); line-height: 1.6; }

.hist-log-wrap { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.hist-log-header {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  padding: 7px 12px; background: var(--surface2); border-bottom: 1px solid var(--border);
  font-family: var(--sans); font-size: var(--fs-xs); color: var(--text-dim);
}
.hist-log-body {
  max-height: min(38vh,360px); overflow-y: auto; background: var(--bg); padding: 8px 12px;
  font-family: var(--mono); font-size: 11px; line-height: 1.65; word-break: break-word;
}
.hist-log-body::-webkit-scrollbar { width: 3px; }
.hist-log-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.hist-log-line { display: block; padding: 1px 0; color: var(--text); }
.hist-log-line.err { color: var(--red); }

.hist-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--text-dim); font-family: var(--sans); font-size: var(--fs-sm); padding: 40px; text-align: center; }
.hist-empty-icon { font-size: 40px; opacity: .35; margin-bottom: 4px; }

.btn-export {
  display: flex; align-items: center; gap: 6px; padding: 6px 14px;
  border-radius: 6px; border: 1px solid var(--border2); background: var(--surface3);
  color: var(--text); font-family: var(--sans); font-size: var(--fs-xs); font-weight: 500;
  cursor: pointer; transition: all .15s; white-space: nowrap;
}

<body>

<script>
// ── 认证 ─────────────────────────────────────────────────────
let _currentSubId  = localStorage.getItem('dashboard_sub_id') || null;
let _currentSiteId = localStorage.getItem('dashboard_site_id') || null;

function readCookie(name) {
  const key = `${name}=`;
  const found = document.cookie.split(';').map(s => s.trim()).find(v => v.startsWith(key));
  return found ? decodeURIComponent(found.slice(key.length)) : '';
}

async function fetchWithAuth(url, opts={}) {
  const method = String(opts.method || 'GET').toUpperCase();
  const headers = { 'Content-Type':'application/json', ...(opts.headers || {}) };
  if (!['GET', 'HEAD', 'OPTIONS'].includes(method)) {
    const csrf = readCookie('csrf_token');
    if (csrf) headers['X-CSRF-Token'] = csrf;
  }
  const r = await fetch(url, { ...opts, method, headers, credentials:'include' });
  if (r.status === 401) { location.href='/login'; throw new Error('UNAUTH'); }
  return r;
}

async function logout() {
  await fetchWithAuth('/api/auth/logout', { method:'POST' });
  location.href = '/login';
}

// ── 初始化 ──────────────────────────────────────────────────

async function init() {
  // 读取用户订阅列表，选出第一个有效订阅
  try {
    const subs = await fetchWithAuth('/api/user/subscriptions').then(r=>r.json());
    if (!subs.length) {
      document.getElementById('headerSubtitle').textContent = '暂无订阅，请先在账户管理中创建厂区';
      return;
    }
    // 优先按 site_id 选中
    const saved = subs.find(s => s.site_id && s.site_id === _currentSiteId) || subs[0];
    _currentSubId = saved.id;
    _currentSiteId = saved.site_id || null;
    localStorage.setItem('dashboard_sub_id', _currentSubId);
    if (_currentSiteId) localStorage.setItem('dashboard_site_id', _currentSiteId);

    // 把订阅厂区名同步到 area select，并把 siteId 注入全局
    window._currentSubId = _currentSubId;
    window._currentSiteId = _currentSiteId;
    window._currentSubName = saved.area_name;
    document.getElementById('headerSubtitle').textContent = saved.area_name;

    // 如果有多个订阅，注入切换下拉（覆盖 checkinAreaSelect 之前的渲染）
    _subs = subs;
    renderCheckinAreaTabs();
    loadPresetUI();
    loadCheckinQR();
    loadSessions();
    connectWS();
    setConnFooter(true, location.host);
  } catch(e) { console.warn('init error', e); }
}

// ── 订阅感知的 API 适配 ──────────────────────────────────────
// Override loadSessions/loadCheckinQR to be subscription-aware



// ── WS subscription 标记 ─────────────────────────────────────
// Patch connectWS to pass siteId
const _origConnectWS = function() {
  if (!location.host) return;
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const siteId = window._currentSiteId || '';
  ws = new WebSocket(`${proto}://${location.host}?siteId=${encodeURIComponent(siteId)}`);
  ws.onopen  = () => setConnFooter(true, location.host);
  ws.onclose = () => { setConnFooter(false, location.host); setTimeout(connectWS, 4000); };
  ws.onerror = () => ws.close();
  ws.onmessage = e => { try { handleWsMessage(JSON.parse(e.data)); } catch(_) {} };
};

// Multiple subscriptions: override renderCheckinAreaTabs to show sub selector
let _subs = [];
// ── Inject all original admin.js below ──────────────────────

// ─── State ─────────────────────────────────────────────────
const API = '';
let ws = null;
let sessionFocusWs = null;
let activeView = 'home';        // 'home' | 'history'
let activeSessionId = null;
let homeTrackedSessionId = null;
let historySearchText = '';
let historySelectedId = null;
let checkinQrData = '';
let logPopoverSessionId = null;
let visitorFilterText   = '';   // 搜索关键词
let visitorFilterStatus = '';   // 状态筛选（''=全部）

const sessionsMap = new Map();
const ADMIN_TOKEN_KEY = 'admin_token';
const PRESET_COMPANY_KEY = 'admin_preset_company';

// ─── Auth ───────────────────────────────────────────────────
function getAdminToken() { return localStorage.getItem(ADMIN_TOKEN_KEY) || ''; }


// ─── 厂区 & 入场码 ──────────────────────────────────────────
let CHECKIN_AREAS = ['全厂区', '车间 A', '车间 B', '仓库区'];
let currentCheckinArea = '全厂区';

function syncCheckinQrImage() {
  const img = document.getElementById('checkinQRImg');
  if (img && checkinQrData) img.src = checkinQrData;
}

async function loadCheckinQR() {
  try {
    const area  = (currentCheckinArea || '').trim();
    const siteId = window._currentSiteId || '';
    const params = new URLSearchParams();
    if (siteId) params.set('siteId', siteId);
    if (area)  params.set('area',  area);
    const url  = '/api/checkin-qr?' + params.toString();
    const res  = await fetchWithAuth(url);
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      console.warn('[loadCheckinQR] 失败:', res.status, err.error || err.message);
      return;
    }
    const data = await res.json();
    if (data.qr) checkinQrData = data.qr;
    syncCheckinQrImage();
  } catch (e) { console.warn('[loadCheckinQR] error:', e); }
}

function _adminRenderCheckinAreaTabs() {
  const select = document.getElementById('checkinAreaSelect');
  if (!select) return;
  select.innerHTML = CHECKIN_AREAS.map(area => {
    const sel = area === currentCheckinArea ? 'selected' : '';
    return `<option value="${esc(area)}" ${sel}>${esc(area)}</option>`;
  }).join('');
}

function _adminOnAreaSelectChange(v) {
  currentCheckinArea = v || '全厂区';
  loadCheckinQR();
}
function onAddCheckinArea() {
  const name = (prompt('请输入新厂区名称：') || '').trim();
  if (!name) return;
  if (!CHECKIN_AREAS.includes(name)) CHECKIN_AREAS.push(name);
  currentCheckinArea = name;
  renderCheckinAreaTabs();
  loadCheckinQR();
}
function onEditCheckinArea(area) {
  const idx = CHECKIN_AREAS.indexOf(area);
  if (idx === -1) return;
  const next = (prompt('重命名厂区：', area) || '').trim();
  if (!next) return;
  if (CHECKIN_AREAS.includes(next) && next !== area) { alert('已存在同名厂区。'); return; }
  CHECKIN_AREAS[idx] = next;
  if (currentCheckinArea === area) currentCheckinArea = next;
  renderCheckinAreaTabs();
  loadCheckinQR();
}
function onDeleteCheckinArea(area) {
  if (CHECKIN_AREAS.length <= 1) { alert('至少保留一个厂区。'); return; }
  const idx = CHECKIN_AREAS.indexOf(area);
  if (idx === -1) return;
  if (!confirm(`确定删除厂区「${area}」吗？`)) return;
  CHECKIN_AREAS.splice(idx, 1);
  if (currentCheckinArea === area) currentCheckinArea = CHECKIN_AREAS[0] || '全厂区';
  renderCheckinAreaTabs();
  loadCheckinQR();
}

// ─── 预设 ───────────────────────────────────────────────────
const PRESET_WIFI_SSID_KEY = 'admin_preset_wifi_ssid';

async function savePresetCompany() {
  const el = document.getElementById('presetDefaultCompany');
  if (el) localStorage.setItem(PRESET_COMPANY_KEY, (el.value || '').trim());
  const wifiEl = document.getElementById('presetWifiSsid');
  if (wifiEl) {
    const ssid = (wifiEl.value || '').trim();
    localStorage.setItem(PRESET_WIFI_SSID_KEY, ssid);
    // 同步写入服务端，使新建会话和访客引导页都能读取
    try {
      const res = await fetchWithAuth('/api/config/wifi-ssid', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ wifiSsid: ssid }),
      });
      if (res.ok) {
        const btn = document.querySelector('.preset-save');
        if (btn) { const orig = btn.textContent; btn.textContent = '✓ 已保存'; setTimeout(() => { btn.textContent = orig; }, 1500); }
      }
    } catch (_) {}
  }
}
function loadPresetUI() {
  const el = document.getElementById('presetDefaultCompany');
  if (el) el.value = localStorage.getItem(PRESET_COMPANY_KEY) || '';
  const wifiEl = document.getElementById('presetWifiSsid');
  if (wifiEl) wifiEl.value = localStorage.getItem(PRESET_WIFI_SSID_KEY) || '';
}
function getPresetWifiSsid() {
  return localStorage.getItem(PRESET_WIFI_SSID_KEY) || '';
}

// ─── WebSocket ──────────────────────────────────────────────
function setConnFooter(online, text) {
  const el = document.getElementById('serverAddr');
  const foot = document.getElementById('leftFooterConn');
  if (el) el.textContent = text;
  if (foot) foot.classList.toggle('is-offline', !online);
}

function _adminConnectWS() {
  if (!location.host) {
    setConnFooter(false, '请通过 http://服务器IP:3000/admin.html 访问');
    return;
  }
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);
  ws.onopen  = () => setConnFooter(true, location.host + ' — 已连接');
  ws.onclose = () => { setConnFooter(false, '连接断开，3s 后重连…'); setTimeout(connectWS, 3000); };
  ws.onmessage = e => {
    try { handleWsMessage(JSON.parse(e.data)); } catch (_) {}
  };
}

function handleWsMessage(msg) {
  switch (msg.event) {
    case 'sessionCreated':
    case 'sessionUpdate':
      updateSession(msg.session);
      if (activeView === 'home') renderVisitorTableBody();
      else if (activeView === 'history') refreshHistoryPageIfOpen();
      break;

    // [修复#2] 处理 command 事件
    case 'command':
      if (msg.command === 'recover_pairing') {
        const s = sessionsMap.get(activeSessionId);
        const name = s ? s.visitorName : '访客';
        showSecurityAlert(
          '⚠️ 建议重置配对',
          `建议为访客 ${esc(name)} 重置无线调试并重新配对\n原因：${esc(msg.reason || '连接失败')}`,
          activeSessionId
        );
      }
      break;

    case 'restrictionDegraded':
      showSecurityAlert(
        '⚠️ 管控降级',
        `访客 ${esc(msg.visitorName)}（${esc(msg.area)}）的管控已生效，但以下项目降级：\n${(msg.warnings || []).map(w => '• ' + w).join('\n')}\n\n建议核查日志确认实际保护效果。`,
        msg.sessionId
      );
      break;

    case 'exitWithoutDevice':
      showSecurityAlert(
        '🚨 管控未解除',
        `访客 ${esc(msg.visitorName)}（${esc(msg.area)}）${msg.forced ? '已强制离厂' : '已扫码离厂'}，但设备不可达，手机上的管控指令未能解除！\n\n手机相机/截屏仍处于限制状态。需告知访客：\n• 重新连接厂区 WiFi 后扫码重试\n• 或重启手机后手动恢复（设置→应用管理）`,
        msg.sessionId
      );
      break;

    case 'deviceDisconnected':
      showSecurityAlert(
        '🚨 设备断连',
        `管控中访客 ${esc(msg.visitorName)}（${esc(msg.area)}）的 ADB 连接已断开！\n请让访客确认手机 WiFi 已连接，再点击卡片上的「重试连接」按钮。`,
        msg.sessionId
      );
      // 立即更新本地 session 状态，使卡片无需等待 WS sessionUpdate 就显示「重试连接」按钮
      if (msg.sessionId && sessionsMap.has(msg.sessionId)) {
        const sess = sessionsMap.get(msg.sessionId);
        sess.status = 'paired_not_connected';
        sess.pairedNotConnectedReason = 'device_disconnected';
        if (activeView === 'home') renderVisitorTableBody();
      }
      break;

    case 'tamperAlert':
      showSecurityAlert(
        '🚨 管控篡改',
        `访客 ${esc(msg.visitorName)}（${esc(msg.area)}）的管控被篡改：\n${(msg.details || []).join('；')}`,
        msg.sessionId
      );
      // [修复#3] 同步到会话内存，供详情页持久展示
      if (msg.sessionId && sessionsMap.has(msg.sessionId)) {
        const sess = sessionsMap.get(msg.sessionId);
        sess._tamperDetected = true;
        sess._tamperDetails  = msg.details || [];
        if (activeView === 'home') renderVisitorTableBody();
      }
      break;

    case 'sessionOverdue':
      showSecurityAlert(
        '⏰ 管控超时',
        `访客 ${esc(msg.visitorName)}（${esc(msg.area)}）管控已持续 ${msg.hours} 小时，请确认是否仍在厂区。\n如已离开请使用「强制离厂」解除管控。`,
        msg.sessionId
      );
      break;
  }
}

// ─── 安全告警 ───────────────────────────────────────────────
function showSecurityAlert(title, message, sessionId) {
  playAlertSound();
  const container = document.getElementById('alertContainer');
  if (!container) return;
  const id = 'alert_' + Date.now();
  const div = document.createElement('div');
  div.id = id;
  div.className = 'security-alert';
  div.style.pointerEvents = 'auto';
  div.innerHTML = `
    <div class="alert-header">
      <strong>${title}</strong>
      <button onclick="dismissAlert('${id}')" class="alert-dismiss">×</button>
    </div>
    <div class="alert-body">${esc(message)}</div>
    ${sessionId ? `<button class="alert-action" onclick="selectSession('${sessionId}'); dismissAlert('${id}')">查看详情</button>` : ''}
  `;
  container.prepend(div);
  setTimeout(() => dismissAlert(id), 30000);
}
function dismissAlert(id) { const el = document.getElementById(id); if (el) el.remove(); }
function playAlertSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [800, 600, 800].forEach((freq, i) => {
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq; gain.gain.value = 0.3;
      osc.start(ctx.currentTime + i * 0.2); osc.stop(ctx.currentTime + i * 0.2 + 0.15);
    });
  } catch (_) {}
}

// ─── 会话管理 ───────────────────────────────────────────────
function updateSession(s) {
  const prev = sessionsMap.get(s.id);
  // 保留本地缓存的篡改标记和实时状态消息
  const merged = { ...s };
  // [修复#3] 从服务器字段恢复篡改标记（刷新后持久展示）
  if (s.tamperDetected) {
    merged._tamperDetected = true;
    if (s.tamperDetails && s.tamperDetails.length) merged._tamperDetails = s.tamperDetails;
  }
  if (prev) {
    if (prev._tamperDetected) { merged._tamperDetected = true; merged._tamperDetails = prev._tamperDetails || merged._tamperDetails; }
    if (prev.liveStatusMessage && prev.status === s.status) merged.liveStatusMessage = prev.liveStatusMessage;
    // 若服务端尚未推送 pairedNotConnectedReason，保留本地设置的断连原因
    if (!merged.pairedNotConnectedReason && prev.pairedNotConnectedReason === 'device_disconnected'
        && merged.status === 'paired_not_connected') {
      merged.pairedNotConnectedReason = 'device_disconnected';
    }
  }
  sessionsMap.set(s.id, merged);
}

function closeSessionFocusWs() {
  if (sessionFocusWs) { try { sessionFocusWs.close(); } catch (_) {} sessionFocusWs = null; }
}

function selectSession(id) {
  const s = sessionsMap.get(id);
  if (!s) return;
  homeTrackedSessionId = id;
  // 已离厂 → 跳历史页
  if (s.status === 'exited') { openHistoryPage(s.visitorName || '', s.id); return; }
  activeView = 'home';
  activeSessionId = id;
  closeSessionFocusWs();
  renderVisitorTableBody();
  // 订阅该会话的实时事件
  if (!location.host) return;
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  sessionFocusWs = new WebSocket(`${proto}://${location.host}?sessionId=${id}`);
  sessionFocusWs.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.event === 'init') { updateSession(msg.session); renderVisitorTableBody(); }
      if (msg.event === 'status' && activeSessionId === id) { updateSessionStatus(id, msg.status, msg.message); }
      if (msg.event === 'log'    && activeSessionId === id) { appendSessionLog(id, msg.message, msg.type); }
    } catch (_) {}
  };
}

function updateSessionStatus(id, status, message) {
  if (sessionsMap.has(id)) {
    const s = sessionsMap.get(id);
    s.status = status;
    s.liveStatusMessage = message;
  }
  renderVisitorTableBody();
  refreshLogPopoverIfOpen();
}

function appendSessionLog(id, message, type = 'info') {
  const ts = new Date().toLocaleTimeString('zh-CN', { hour12: false });
  const line = `[${ts}] ${message}`;
  if (sessionsMap.has(id)) {
    const s = sessionsMap.get(id);
    s.logs = s.logs || [];
    s.logs.push(line);
  }
  renderVisitorTableBody();
  refreshLogPopoverIfOpen();
}

function selectHome() {
  activeView = 'home'; activeSessionId = null;
  closeSessionFocusWs(); closeVisitorLogPopover();
  renderHomeDashboard();
}

// ─── 页面一：访客列表渲染 ────────────────────────────────────
function renderHomeDashboard() {
  syncCheckinQrImage();
  document.getElementById('mainContent').innerHTML = `
    <div class="home-dashboard">
      <div class="home-main">
        <div class="visitor-table-wrap">
          <div class="visitor-table-head">
            <span>当前访客</span>
            <div class="visitor-table-head-actions">

              <span class="visitor-search-icon">⌕</span>

                type="text"
                id="visitorSearchInput"
                class="visitor-search-input"
                placeholder="搜索姓名、公司、区域、设备 ID…"
                value="${esc(visitorFilterText)}"
                oninput="onVisitorSearch(this.value)"

              />
              ${visitorFilterText ? `<button class="visitor-search-clear" onclick="clearVisitorSearch()" title="清除搜索">×</button>` : ''}
            </div>
            <div class="visitor-filter-tabs" id="visitorFilterTabs">
              ${buildFilterTabs()}
            </div>

          <!-- 访客卡片列表 -->

          <div id="visitorLogPopover" class="visitor-log-popover is-hidden" aria-hidden="true">

              <span id="visitorLogPopoverTitle">操作日志</span>
              <button type="button" onclick="closeVisitorLogPopover()">关闭</button>
            </div>
            <div id="visitorLogPopoverBody" class="visitor-log-popover-body"></div>
          </div>
        </div>
      </div>
    </div>
  `;
  renderVisitorTableBody();
}

function renderVisitorTableBody() {
  const el = document.getElementById('visitorListBody');
  if (!el) return;

  const all = [...sessionsMap.values()].filter(s => s.status !== 'exited');

  // 状态筛选
  let filtered = visitorFilterStatus
    ? all.filter(s => s.status === visitorFilterStatus)
    : all;

  // 关键词搜索（姓名/公司/区域/设备ID，不区分大小写）
  const kw = visitorFilterText.trim().toLowerCase();
  if (kw) {
    filtered = filtered.filter(s =>
      (s.visitorName    || '').toLowerCase().includes(kw) ||
      (s.visitorCompany || '').toLowerCase().includes(kw) ||
      (s.area           || '').toLowerCase().includes(kw) ||
      (s.deviceId       || '').toLowerCase().includes(kw) ||
      (s.deviceIp       || '').toLowerCase().includes(kw)
    );
  }

  // 更新筛选 tabs 计数（实时反映 sessionsMap 变化）
  const tabsEl = document.getElementById('visitorFilterTabs');
  if (tabsEl) tabsEl.innerHTML = buildFilterTabs();

  // 更新搜索框清除按钮
  const clearBtn = document.querySelector('.visitor-search-clear');
  const existsClear = !!clearBtn;
  if (visitorFilterText && !existsClear) {
    const wrap = document.querySelector('.visitor-search-wrap');
    if (wrap) {
      const btn = document.createElement('button');
      btn.className = 'visitor-search-clear';
      btn.title = '清除搜索';
      btn.textContent = '×';
      btn.onclick = clearVisitorSearch;
      wrap.appendChild(btn);
    }
  } else if (!visitorFilterText && clearBtn) {
    clearBtn.remove();
  }

  if (!all.length) {
    el.innerHTML = `<div class="visitor-empty">
      暂无待处理访客。<br/>请访客扫描左侧<strong>常驻入场码</strong>登记入场。<br/>
      <span style="font-size:12px;opacity:.8">已离厂数据请点击右上角「历史记录」或左侧「打开」搜索查看。</span>
    </div>`;
    return;
  }

  if (!filtered.length) {
    const tip = kw
      ? `未找到与「${esc(visitorFilterText)}」相关的访客`
      : `没有处于「${statusLabel(visitorFilterStatus)}」状态的访客`;
    el.innerHTML = `<div class="visitor-empty visitor-empty-filter">
      <div class="empty-filter-icon">🔍</div>
      <div>${tip}</div>
      <button class="btn btn-sm btn-outline" style="margin-top:10px" onclick="clearVisitorFilter()">清除筛选</button>
    </div>`;
    return;
  }

  const sorted = filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
  el.innerHTML = sorted.map(s => buildVisitorRowHtml(s)).join('');
  refreshLogPopoverIfOpen();
}

const FILTER_STATUS_OPTIONS = [
  { value: '',                    label: '全部' },
  { value: 'waiting',             label: '等待配对' },
  { value: 'pairing',             label: '配对中' },
  { value: 'paired_not_connected',label: '断开' },
  { value: 'restricted',          label: '管控中' },
  { value: 'error',               label: '异常' },
];

function buildFilterTabs() {
  const all = [...sessionsMap.values()].filter(s => s.status !== 'exited');
  return FILTER_STATUS_OPTIONS.map(opt => {
    const count = opt.value ? all.filter(s => s.status === opt.value).length : all.length;
    const active = visitorFilterStatus === opt.value ? ' ftab-active' : '';
    const hasItems = count > 0;
    return `<button
      type="button"
      class="ftab${active}${!hasItems && opt.value ? ' ftab-empty' : ''}"
      onclick="setVisitorFilterStatus('${opt.value}')"
    >${opt.label}<span class="ftab-count">${count}</span></button>`;
  }).join('');
}

function setVisitorFilterStatus(status) {
  visitorFilterStatus = status;
  renderVisitorTableBody();
}

function onVisitorSearch(value) {
  visitorFilterText = value;
  renderVisitorTableBody();
}

function clearVisitorSearch() {
  visitorFilterText = '';

function clearVisitorFilter() {

// ─── 管控详情摘要（从日志提取真实数据）───────────────────────
function buildRestrictionSummary(s) {
  const ent = parseLogEntries(s);
  const st  = s.status;
  const done    = ['restricted','exiting','exited'].includes(st);
  const active  = ['pairing','paired_not_connected'].includes(st);
  const waiting = st === 'waiting';

  // ── ADB 连接状态 ──
  let adbCls = 'pill-wait', adbText = '待连';
  if (st === 'paired_not_connected') { adbCls = 'pill-err'; adbText = '断连'; }
  else if (s.deviceId && done)        { adbCls = 'pill-ok';  adbText = '已连'; }
  else if (st === 'pairing')          { adbCls = 'pill-info'; adbText = '配对中'; }
  else if (st === 'error')            { adbCls = 'pill-warn'; adbText = '异常'; }

  // 还未到管控阶段：只显示 ADB 状态
  if (waiting) {
    return `<div class="control-pills"><span class="pill ${adbCls}">ADB ${adbText}</span></div>`;
  }

  // ── 从日志提取实际管控数据 ──
  // 冻结的相机/录屏包数量
  const frozenCount  = ent.filter(e => /✓ \[(disable|suspend)\]/.test(e.message)).length;
  // 封锁相机权限的应用数量
  const blockedCount = ent.filter(e => /✓ 已封锁：/.test(e.message)).length;
  // 移除的控制中心 Tile 数量
  const tileCount    = ent.filter(e => /✓ \[移除 Tile\]/.test(e.message)).length;

  // 截屏方式（强→弱依次判断）
  let shotMethod = '', shotStrong = false;
  if (hasStep(ent, [/DPM 截屏禁用已设置|device_policy 截屏禁用已设置|wm screen-capture 截屏禁用已设置/])) {
    shotMethod = 'DPM'; shotStrong = true;
  } else if (hasStep(ent, [/系统截屏策略已设置（settings）/])) {
    shotMethod = 'settings';
  } else if (done) {
    shotMethod = '—';
  }

  // ── 告警项 ──
  const warnDpm   = hasStep(ent, [/DPM\/wm 截屏禁用不可用/]);
  const warnSysui = hasStep(ent, [/SystemUI 重启失败/]);
  const warnAdb   = hasStep(ent, [/无线调试关闭失败/]);
  const warnPerm  = hasStep(ent, [/无法设置 user-fixed/]);

  // ── 构建 pills ──
  const okCls   = done   ? 'pill-ok'   : active ? 'pill-info' : 'pill-wait';
  const dimCls  = done   ? 'pill-off'  : 'pill-wait';

  const pills = [];

  // ADB
  pills.push(`<span class="pill ${adbCls}">ADB·${adbText}</span>`);

  // 相机应用冻结
  if (frozenCount > 0) {
    pills.push(`<span class="pill ${okCls}" title="已冻结的相机/录屏应用">相机×${frozenCount}</span>`);
  } else if (done) {
    pills.push(`<span class="pill ${dimCls}" title="未发现需冻结的相机应用">相机×0</span>`);
  }

  // 摄像头权限封锁
  if (blockedCount > 0) {
    pills.push(`<span class="pill ${okCls}" title="已封锁摄像头权限的应用">权限×${blockedCount}</span>`);
  } else if (done) {
    pills.push(`<span class="pill ${dimCls}" title="未封锁应用摄像头权限">权限×0</span>`);
  }

  // 截屏方式
  if (shotMethod && shotMethod !== '—') {
    const sCls = shotStrong ? 'pill-ok' : (warnDpm ? 'pill-warn' : 'pill-ok');
    pills.push(`<span class="pill ${sCls}" title="截屏限制方式">截屏·${shotMethod}</span>`);
  } else if (done) {
    pills.push(`<span class="pill ${dimCls}" title="截屏状态未确认">截屏·?</span>`);
  }

  // Tile
  if (tileCount > 0) {
    pills.push(`<span class="pill ${okCls}" title="已从控制中心移除的截屏/录屏按钮">Tile×${tileCount}</span>`);
  } else if (done) {
    pills.push(`<span class="pill ${dimCls}" title="控制中心无截屏Tile">Tile×0</span>`);
  }

  // ── 告警 pills ──
  const warns = [];
  if (warnDpm)   warns.push(`<span class="pill pill-warn restrict-warn" title="DPM/wm 截屏禁用不可用，已降级为 settings 方式，部分 ROM（如荣耀/华为）可能无效">⚠ 截屏降级</span>`);
  if (warnSysui) warns.push(`<span class="pill pill-warn restrict-warn" title="SystemUI 重启失败，控制中心截屏按钮下拉一次后才会消失">⚠ 控制中心</span>`);
  if (warnAdb)   warns.push(`<span class="pill pill-warn restrict-warn" title="无线调试未成功关闭，请提醒访客在开发者选项中手动关闭">⚠ 调试未关</span>`);
  if (warnPerm)  warns.push(`<span class="pill pill-warn restrict-warn" title="此 ROM 不支持 permission-flags，摄像头权限封锁仅依赖 appops，效果略弱">⚠ 权限降级</span>`);

  return `
    <div class="control-pills restriction-pills">${pills.join('')}</div>
    ${warns.length ? `<div class="control-pills warn-pills">${warns.join('')}</div>` : ''}
  `;
}

// ─── 废弃旧函数，保持向后兼容 ───────────────────────────────
function buildControlPillsHtml(s) { return buildRestrictionSummary(s); }

// ─── 流程步骤 ────────────────────────────────────────────────
// [修复#6] 为 paired_not_connected 的 adb 步骤添加 error 红色状态
function buildSteps(status) {
  const steps = [
    { key: 'app',      label: 'APP 已上报设备 IP',  doneAt: ['pairing','paired_not_connected','restricted','exiting','exited'] },
    { key: 'adb',      label: 'ADB 配对 & 连接成功', doneAt: ['restricted','exiting','exited'] },
    { key: 'restrict', label: '管控指令已下发',       doneAt: ['restricted','exiting','exited'] },
    { key: 'exit',     label: '访客已离厂',           doneAt: ['exited'] },
  ];
  // paired_not_connected 时 adb 步骤单独显示 error；其余 active 逻辑维持原样
  const activeMap = { waiting: '', pairing: 'app', paired_not_connected: '', restricted: '', exiting: 'exit', error: '' };
  const activeKey = activeMap[status] || '';

  return steps.map((item, i) => {
    const done    = item.doneAt.includes(status);
    const isError = !done && status === 'paired_not_connected' && item.key === 'adb';
    const active  = !done && !isError && item.key === activeKey;
    const cls  = done ? 'done' : isError ? 'error' : active ? 'active' : '';
    const icon = done ? '✓' : isError ? '✗' : (i + 1).toString();
    return `<div class="step ${cls}"><div class="step-icon">${icon}</div><div class="step-text">${item.label}</div></div>`;
  }).join('');
}

// ─── 日志展开面板 ────────────────────────────────────────────
function openVisitorLogPopover(sessionId) {
  const s = sessionsMap.get(sessionId);
  const wrap  = document.getElementById('visitorLogPopover');
  const body  = document.getElementById('visitorLogPopoverBody');
  const title = document.getElementById('visitorLogPopoverTitle');
  if (!wrap || !body || !title || !s) { closeVisitorLogPopover(); return; }
  logPopoverSessionId = sessionId;
  title.textContent = `操作日志 · ${s.visitorName}（${(s.logs || []).length} 条）`;
  const lines = s.logs || [];
  body.innerHTML = lines.length
    ? lines.map(l => {
        const isErr = l.toLowerCase().includes('error') || l.includes('❌') || l.includes('篡改');
        return `<div class="log-entry-pop ${isErr ? 'error' : ''}">${esc(l)}</div>`;
      }).join('')
    : '<div class="log-empty">暂无日志</div>';
  wrap.classList.remove('is-hidden');
  wrap.setAttribute('aria-hidden', 'false');
  body.scrollTop = body.scrollHeight;
}
function closeVisitorLogPopover() {
  logPopoverSessionId = null;
  const wrap = document.getElementById('visitorLogPopover');
  if (wrap) { wrap.classList.add('is-hidden'); wrap.setAttribute('aria-hidden', 'true'); }
}
function refreshLogPopoverIfOpen() {
  if (logPopoverSessionId && sessionsMap.has(logPopoverSessionId)) openVisitorLogPopover(logPopoverSessionId);
}

// ── 历史筛选状态 ────────────────────────────────────────────
let historyFilterArea   = '';
let historyFilterDate   = '';
let historyFilterTamper = false;

function getFilteredExitedSessions() {
  const q    = (historySearchText || '').trim().toLowerCase();
  const area = historyFilterArea;
  const date = historyFilterDate;

  let base = [...sessionsMap.values()]
    .filter(s => s.status === 'exited')
    .sort((a, b) => new Date(b.exitedAt || b.createdAt) - new Date(a.exitedAt || a.createdAt));

  if (q) base = base.filter(s =>
    (s.visitorName    || '').toLowerCase().includes(q) ||
    (s.visitorCompany || '').toLowerCase().includes(q) ||
    (s.deviceId       || '').toLowerCase().includes(q) ||
    (s.area           || '').toLowerCase().includes(q)
  );

  if (area) base = base.filter(s => s.area === area);

  if (date) {
    const d = new Date(date);
    const next = new Date(d); next.setDate(next.getDate() + 1);
    base = base.filter(s => {
      const t = new Date(s.exitedAt || s.createdAt);
      return t >= d && t < next;
    });
  }

  if (historyFilterTamper) {
    base = base.filter(s => {
      const tamperLogs = (s.logs || []).some(l => l.includes('管控完整性异常') || l.includes('篡改'));
      return s._tamperDetected || s.tamperDetected || tamperLogs;
    });
  }

  return base;
}

function getHistoryStats(list) {
  const all = [...sessionsMap.values()].filter(s => s.status === 'exited');
  let totalDuration = 0, validDuration = 0;
  let tamperCount = 0, longStayCount = 0;

  all.forEach(s => {
    const tamperLogs = (s.logs || []).some(l => l.includes('管控完整性异常') || l.includes('篡改'));
    if (s._tamperDetected || s.tamperDetected || tamperLogs) tamperCount++;
    if (s.restrictedAt && s.exitedAt) {
      const dur = new Date(s.exitedAt) - new Date(s.restrictedAt);
      totalDuration += dur;
      validDuration++;
      if (dur > 8 * 3600000) longStayCount++;
    }
  });

  const avgMin = validDuration > 0 ? Math.round(totalDuration / validDuration / 60000) : 0;
  return { total: all.length, filtered: list.length, tamperCount, longStayCount, avgMin };
}

function calcDuration(s) {
  if (!s.restrictedAt || !s.exitedAt) return null;
  const ms = new Date(s.exitedAt) - new Date(s.restrictedAt);
  if (ms < 0) return null;
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

function getAreaOptions() {
  const areas = [...new Set(
    [...sessionsMap.values()].filter(s => s.status === 'exited').map(s => s.area).filter(Boolean)
  )].sort();
  return areas;
}

// ── 导出 CSV ────────────────────────────────────────────────
function exportHistoryCSV(list) {
  if (!list.length) { alert('无数据可导出'); return; }
  const cols = ['姓名', '公司/单位', '区域', '设备ID', '设备IP', '登记时间', '管控生效', '离厂时间', '在厂时长(分钟)', 'WiFi', '自助入场', '篡改告警', '会话ID'];
  const rows = list.map(s => {
    const tamperLogs = (s.logs || []).some(l => l.includes('管控完整性异常') || l.includes('篡改'));
    const hasTamper  = s._tamperDetected || s.tamperDetected || tamperLogs;
    const durMin = (s.restrictedAt && s.exitedAt)
      ? Math.round((new Date(s.exitedAt) - new Date(s.restrictedAt)) / 60000)
      : '';
    const csvVal = v => `"${String(v || '').replace(/"/g, '""')}"`;
    return [
      csvVal(s.visitorName), csvVal(s.visitorCompany), csvVal(s.area),
      csvVal(s.deviceId), csvVal(s.deviceIp),
      csvVal(s.createdAt ? new Date(s.createdAt).toLocaleString('zh-CN', {hour12:false}) : ''),
      csvVal(s.restrictedAt ? new Date(s.restrictedAt).toLocaleString('zh-CN', {hour12:false}) : ''),
      csvVal(s.exitedAt ? new Date(s.exitedAt).toLocaleString('zh-CN', {hour12:false}) : ''),
      csvVal(durMin),
      csvVal(s.wifiSsid), csvVal(s.selfCheckin ? '是' : '否'),
      csvVal(hasTamper ? '是' : '否'), csvVal(s.id),
    ].join(',');
  });
  const bom  = '\uFEFF';
  const csv  = bom + cols.join(',') + '\n' + rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `访客记录_${new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function exportHistoryCSVFromServer(scope) {
  const siteId = window._currentSiteId || '';
  if (!siteId) { alert('缺少 siteId，无法导出'); return; }
  const p = new URLSearchParams({ siteId, status: 'exited' });
  if (scope === 'filtered') {
    if (historySearchText) p.set('q', historySearchText);
    if (historyFilterDate) {
      const from = new Date(historyFilterDate);
      const to = new Date(from);
      to.setDate(to.getDate() + 1);
      to.setMilliseconds(to.getMilliseconds() - 1);
      p.set('from', String(from.getTime()));
      p.set('to', String(to.getTime()));
    }
  }
  const url = `/api/history/sessions/export?${p.toString()}`;
  window.open(url, '_blank');
}

function selectHistoryRow(id) {
  historySelectedId = id;
  // 更新列表高亮
  document.querySelectorAll('.hist-row').forEach(el => el.classList.remove('is-active'));
  document.querySelectorAll('.hist-row').forEach(el => {
    if (el.onclick && el.onclick.toString().includes(id)) el.classList.add('is-active');
  });
  renderHistoryDetail(id);
}

function onHistoryFilterChange(type, value) {
  if (type === 'search') historySearchText = value;
  else if (type === 'area') historyFilterArea = value;
  else if (type === 'date') historyFilterDate = value;
  else if (type === 'tamper') historyFilterTamper = !!value;
  renderHistoryList();
  // 更新统计条和结果数
  const stats = getHistoryStats(getFilteredExitedSessions());
  const countEl = document.querySelector('.hist-result-count');
  if (countEl) countEl.textContent = getFilteredExitedSessions().length + ' 条';
  // 重新生成汇总行
  const statEls = document.querySelectorAll('.hist-stat-val');
  if (statEls.length >= 5) {
    statEls[0].textContent = stats.total;
    statEls[1].textContent = stats.filtered;
    statEls[2].textContent = stats.avgMin > 0 ? (stats.avgMin >= 60 ? Math.round(stats.avgMin/60)+'h' : stats.avgMin+'m') : '—';
    statEls[3].textContent = stats.longStayCount;
    statEls[4].textContent = stats.tamperCount;
  }
  // 同步选中状态
  if (historySelectedId) {
    const list = getFilteredExitedSessions();
    if (!list.some(s => s.id === historySelectedId) && list.length) {
      historySelectedId = list[0].id;
      renderHistoryDetail(historySelectedId);
    }
  }
}

function clearHistorySearch() {
  historySearchText = '';
  const inp = document.getElementById('historySearchInput');
  if (inp) { inp.value = ''; inp.focus(); }
  onHistoryFilterChange('search', '');
}

function clearHistoryFilters() {
  historySearchText   = '';
  historyFilterArea   = '';
  historyFilterDate   = '';
  historyFilterTamper = false;
  renderHistoryFullPage();
}

function onHistorySearchInput(v) { onHistoryFilterChange('search', v); }
function refreshHistoryPageIfOpen() {
  if (activeView !== 'history') return;
  renderHistoryList();
  if (historySelectedId) renderHistoryDetail(historySelectedId);
}
function syncHistorySelectionAfterFilter() {
  const list = getFilteredExitedSessions();
  if (historySelectedId && list.some(s => s.id === historySelectedId)) return;
  historySelectedId = list.length ? list[0].id : null;
}
