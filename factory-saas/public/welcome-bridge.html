<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>厂区访客 · 下一步</title>
  <style>
    :root {
      --accent: #3b82f6;
      --accent-soft: rgba(59,130,246,.12);
      --text: #e5e7eb;
      --text-dim: #9ca3af;
      --danger: #f97373;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at top, #111827 0, #020617 55%, #000 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: rgba(15,23,42,.9);
      border-radius: 18px;
      border: 1px solid rgba(148,163,184,.25);
      padding: 24px 20px;
    }
    .title { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
    .subtitle { font-size: 13px; color: var(--text-dim); line-height: 1.7; margin-bottom: 18px; }
    .status {
      font-size: 14px;
      padding: 12px 14px;
      border-radius: 10px;
      background: rgba(15,23,42,.9);
      border: 1px solid rgba(148,163,184,.45);
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
      flex-shrink: 0;
      margin-top: 6px;
    }
    .status-text { flex: 1; }
    .status-main {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .status-sub {
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.7;
    }
    .open-app-section { display: none; margin-top: 18px; padding: 14px; background: rgba(0,0,0,.25); border-radius: 10px; border: 1px solid rgba(148,163,184,.3); }
    .open-app-section.show { display: block; }
    .section-label { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .open-app-section .hint { font-size: 12px; color: var(--text-dim); line-height: 1.6; margin-bottom: 10px; }
    .btn-open-app { width: 100%; padding: 12px; border-radius: 8px; border: none; background: linear-gradient(135deg, #3b82f6, #06b6d4); color: #fff; font-size: 15px; font-weight: 500; cursor: pointer; }
    .btn-open-app:active { opacity: .9; }
    .download-section { display: none; margin-top: 12px; padding: 14px; background: rgba(0,0,0,.25); border-radius: 10px; border: 1px solid rgba(148,163,184,.3); }
    .download-section.show { display: block; }
    .download-section .section-label { margin-bottom: 8px; }
    .download-section .hint { font-size: 12px; color: var(--text-dim); line-height: 1.6; margin-bottom: 10px; }
    .download-link { display: block; text-align: center; padding: 12px; margin-bottom: 10px; border-radius: 8px; background: linear-gradient(135deg, #3b82f6, #06b6d4); color: #fff; font-size: 15px; font-weight: 500; text-decoration: none; }
    .download-link:active { opacity: .9; }
    .download-url { font-size: 12px; word-break: break-all; color: var(--accent); padding: 10px; background: rgba(0,0,0,.3); border-radius: 6px; margin-bottom: 10px; -webkit-user-select: all; user-select: all; }
    .btn-copy { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-size: 14px; cursor: pointer; }
    .btn-copy:active { opacity: .8; }
    .small { font-size: 11px; color: var(--text-dim); text-align: center; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">厂区访客自助入场</div>
    <div class="subtitle" id="subtitle">您的登记已完成，下一步请根据提示完成安装/打开 APP。</div>

    <div class="status">
      <div class="status-dot"></div>
      <div class="status-text">
        <div class="status-main" id="statusMain"></div>
        <div class="status-sub" id="statusSub"></div>
      </div>
    </div>

    <div class="open-app-section" id="openAppSection">
      <div class="section-label">已安装 APP？</div>
      <div class="hint">若未自动打开，请点击下方按钮唤起「厂区管控」APP。</div>
      <button type="button" class="btn-open-app" id="btnOpenApp">打开「厂区管控」APP</button>
    </div>

    <div class="download-section" id="downloadSection">
      <div class="section-label">未安装 APP？</div>
      <div class="hint">请<strong>点击下方链接</strong>下载安装包；若点击无反应，可长按链接复制后粘贴到地址栏打开。安装完成后重新扫描自助入场码即可。</div>
      <a class="download-link" id="downloadLink" href="">点击下载「厂区管控」APP</a>
      <div class="download-url" id="downloadUrl"></div>
      <button type="button" class="btn-copy" id="btnCopy">复制链接</button>
    </div>

    <div class="small">如有问题请联系门卫协助</div>
  </div>

  <script>
    (function () {
      const statusMain  = document.getElementById('statusMain');
      const statusSub   = document.getElementById('statusSub');
      const openAppSection = document.getElementById('openAppSection');
      const btnOpenApp  = document.getElementById('btnOpenApp');
      const downloadSection = document.getElementById('downloadSection');
      const downloadLinkEl  = document.getElementById('downloadLink');
      const downloadUrlEl   = document.getElementById('downloadUrl');
      const btnCopy    = document.getElementById('btnCopy');

      const isWechat = /MicroMessenger/i.test(navigator.userAgent);
      let appOpened = false;
      let currentSchemeUrl = '';
      const downloadUrl = location.origin + '/factory-control.apk';
      const urlParams = new URLSearchParams(location.search);
      const sessionId = urlParams.get('sessionId') || '';
      const areaParam = urlParams.get('area') || '';

      function setStatus(main, sub) {
        statusMain.textContent = main;
        statusSub.textContent  = sub || '';
      }

      if (isWechat) {
        // 微信内：只提示“在浏览器中打开”，不做任何唤起 / 下载动作
        setStatus(
          '请在浏览器中继续操作',
          '登记已完成。请点击右上角的「⋯」按钮，在菜单中选择「在默认浏览器中打开」本页，然后按提示安装/打开 APP。'
        );
      } else {
        // 系统浏览器：尝试唤起 APP，失败则展示下载方式
        if (!sessionId) {
          setStatus('缺少会话信息', '请返回上一页重新扫码登记。');
          return;
        }

        setStatus('正在打开 APP…', '如几秒内未跳转，可点击下方按钮再次尝试。');
        const server = location.origin;
        currentSchemeUrl =
          'factorycontrol://checkin?sessionId=' + encodeURIComponent(sessionId) +
          '&server=' + encodeURIComponent(server);

        try { window.location.href = currentSchemeUrl; } catch (_) {}

        document.addEventListener('visibilitychange', () => {
          if (document.hidden) appOpened = true;
        });
        window.addEventListener('pagehide', () => { appOpened = true; });
        window.addEventListener('blur', () => { appOpened = true; });

        // 约 1 秒后显示「打开 APP」按钮（已安装但未自动唤起时可点）
        setTimeout(() => {
          if (appOpened) return;
          openAppSection.classList.add('show');
        }, 1000);

        // 约 2.5 秒后若仍在页面上，视为未安装，只显示下载区块
        setTimeout(() => {
          if (appOpened) return;
          openAppSection.classList.remove('show');
          downloadLinkEl.href = downloadUrl;
          downloadUrlEl.textContent = downloadUrl;
          downloadSection.classList.add('show');
          setStatus('未检测到「厂区管控」APP', '请点击下方按钮或链接下载，安装后重新扫描自助入场码。');
        }, 2500);
      }

      btnOpenApp.addEventListener('click', () => {
        if (currentSchemeUrl) window.location.href = currentSchemeUrl;
      });

      btnCopy.addEventListener('click', () => {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(downloadUrl).then(() => {
            btnCopy.textContent = '已复制';
            setTimeout(() => { btnCopy.textContent = '复制链接'; }, 2000);
          }).catch(() => { btnCopy.textContent = '请长按上方链接复制'; });
        } else {
          btnCopy.textContent = '请长按上方链接复制';
        }
      });
    })();
  </script>
</body>
</html>
